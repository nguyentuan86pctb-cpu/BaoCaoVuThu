<script>
function dongBannerNhacBai() {
    document.getElementById('banner-nhac-bai').classList.add('hidden');
    document.getElementById('banner-nhac-bai').classList.remove('flex');
}

// ==========================================
// LOGIC BÁO CÁO DƯ NỢ & CACHING SIÊU TỐC
// ==========================================
const STORAGE_KEY = 'evn_duno_ticks_vuthu';
const STORAGE_NOTE_KEY = 'evn_duno_notes_vuthu';
let danhSachTickCache = new Set(); 
let dictGhiChu = {};

function khoiTaoCacheTick() {
    let homNay = new Date().toLocaleDateString('vi-VN');
    let data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    if (data.ngay !== homNay) { data = { ngay: homNay, dsMaKH: [] }; localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
    danhSachTickCache = new Set(data.dsMaKH || []);
    dictGhiChu = JSON.parse(localStorage.getItem(STORAGE_NOTE_KEY) || '{}');
}

function luuTrangThaiTick(maKH, isTick) {
    if (!maKH) return; let maStr = String(maKH);
    if (isTick) danhSachTickCache.add(maStr); else danhSachTickCache.delete(maStr);
    let data = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
    data.dsMaKH = Array.from(danhSachTickCache); localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

function luuGhiChu(maKH, noteText) {
    if (!maKH) return; let maStr = String(maKH);
    if (noteText && noteText.trim() !== '') dictGhiChu[maStr] = noteText.trim(); else delete dictGhiChu[maStr];
    localStorage.setItem(STORAGE_NOTE_KEY, JSON.stringify(dictGhiChu));
}

let dataTableDuNo = null;  
let cotTNV_global = null, cotTien_global = null, cotTram_global = null, cotCot_global = null, cotSDT_global = null, cotMaKH = null, cotTenKH = null;
let nguongLocTien = 0; let mangCotHoanChinh = []; 

// Natural sorting helper cho Trạm/Cột
$.fn.dataTable.ext.type.order['natural-asc'] = function (a, b) { return String(a).localeCompare(String(b), undefined, {numeric: true, sensitivity: 'base'}); };
$.fn.dataTable.ext.type.order['natural-desc'] = function (a, b) { return String(b).localeCompare(String(a), undefined, {numeric: true, sensitivity: 'base'}); };

const COT_CAN_AN = ['địa chỉ', 'dia chi', 'thu ngân', 'thu ngan', 'tnv', 'thu ngân viên', 'kỳ', 'tháng', 'năm', 'kỳ tháng năm', 'ky thang nam', 'loại hóa đơn', 'loai hoa don', 'ngày phát hành', 'ngay phat hanh'];
function kiemTraAnCot(tenCot) { return COT_CAN_AN.some(an => tenCot.toLowerCase().trim().includes(an)); }

async function taiDuLieuDuNo() {
    try {
        const res = await fetch(`https://raw.githubusercontent.com/nguyentuan86pctb-cpu/BaoCaoVuThu/main/data_duno.json?t=${Date.now()}`);
        if (!res.ok) throw new Error("Chưa có data_duno.json trên Github!");
        const json = await res.json();
        
        let rawRecords = json.du_lieu || [];
        const records = rawRecords.filter(r => {
            let ma = String(r['Mã khách hàng'] || '').trim();
            let ten = String(r['Tên khách hàng'] || '').trim();
            if (!ma) return false; 
            if (ten.includes('Ký, họ tên') || ten.includes('Thu ngân viên') || ten.includes('Phòng kinh doanh') || ten.includes('Kế toán')) return false;
            return true;
        });

        if (records.length === 0) return;

        document.getElementById('cap-nhat-luc-duno').innerHTML = `<svg class="w-4 h-4 text-green-600 inline mr-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> Cập nhật lúc: <span class="font-bold text-evnDark ml-1">${json.cap_nhat_luc || '--'}</span>`;

        khoiTaoCacheTick();

        const keys = Object.keys(records[0]);
        mangCotHoanChinh = keys;
        cotTNV_global  = keys.find(k => k.toLowerCase().includes('thu ngân') || k.toLowerCase().includes('tnv') || k.toLowerCase().includes('thu ngan'));
        cotTien_global = keys.find(k => k.toLowerCase().includes('tổng tiền') || k.toLowerCase().includes('tong tien') || k.toLowerCase().includes('nợ'));
        cotTram_global = keys.find(k => k.toLowerCase().includes('trạm') || k.toLowerCase().includes('tram'));
        cotCot_global  = keys.find(k => k.toLowerCase().includes('cột') || k.toLowerCase().includes('cot'));
        cotSDT_global  = keys.find(k => k.toLowerCase().includes('sdt') || k.toLowerCase().includes('điện thoại') || k.toLowerCase().includes('đt'));
        cotMaKH        = keys.find(k => k.toLowerCase().includes('mã kh') || k.toLowerCase().includes('ma kh'));
        cotTenKH       = keys.find(k => k.toLowerCase().includes('tên kh') || k.toLowerCase().includes('ten kh'));

        if (cotTNV_global) {

function xuatExcelTheoDieuKien() {
    if (!dataTableDuNo) { alert('Chưa có dữ liệu sếp ơi!'); return; }
    const tenTNV = $('#filter-tnv').val() || 'TatCa'; 
    const tenFile = `DuNo_VuThu_${tenTNV.replace(/\s+/g, '_')}_${new Date().toLocaleDateString('vi-VN').replace(/\//g, '-')}.xlsx`;
    const rows = dataTableDuNo.rows({ search: 'applied' }).data().toArray(); 
    if (rows.length === 0) { alert('Không có dữ liệu để xuất!'); return; }
    const dsKeyXuat = mangCotHoanChinh.filter(k => !kiemTraAnCot(k)); 
    const duLieuXuat = [dsKeyXuat.map(k => k.toUpperCase())]; 
    rows.forEach(row => { duLieuXuat.push(dsKeyXuat.map(k => (row[k] !== null && row[k] !== undefined) ? row[k] : '')); });
    try { const wb = XLSX.utils.book_new(); const ws = XLSX.utils.aoa_to_sheet(duLieuXuat); XLSX.utils.book_append_sheet(wb, ws, 'DuNo'); XLSX.writeFile(wb, tenFile); }

function taoFormLien(tenLien, ngayIn, data) {
    return `<div class="lien-thong-bao"><div style="font-weight:bold; font-size:11px; font-style:italic; margin-bottom:4px;">${tenLien}</div><table style="width:100%; border:none; border-collapse:collapse; margin-bottom:6px;"><tr><td style="width:42%; vertical-align:top; text-align:center; border:none; padding:0 4px 0 0;"><div style="font-size:11px; font-weight:bold; line-height:1.3;">Công ty Điện Lực Thái Bình</div><div style="font-size:12.5px; font-weight:bold; text-decoration:underline; line-height:1.3;">ĐIỆN LỰC VŨ THƯ</div></td><td style="width:58%; vertical-align:top; text-align:center; border:none; padding:0 0 0 4px;"><div style="font-size:11.5px; font-weight:bold; line-height:1.3;">CỘNG HOÀ XÃ HỘI CHỦ NGHĨA VIỆT NAM</div><div style="font-size:11.5px; font-weight:bold; text-decoration:underline; font-style:italic; line-height:1.3;">Độc lập - Tự do - Hạnh phúc</div><div style="font-size:11px; font-style:italic; text-align:right; margin-top:2px;">Ngày ${ngayIn}</div></td></tr></table><div style="text-align:center; font-size:14px; font-weight:bold; margin:8px 0; line-height:1.4;">THÔNG BÁO THANH TOÁN TIỀN ĐIỆN,<br>THÔNG BÁO NGỪNG CẤP ĐIỆN</div><p style="margin:4px 0; font-size:12px; line-height:1.4;"><u><i>Kính gửi</i></u>: Ông (bà): <b>${data.ten} - ${data.sdt}</b></p><p style="margin:4px 0; font-size:12px; line-height:1.4;">Địa chỉ: <b>${data.diaChi}</b></p><p style="margin:4px 0; font-size:12px; line-height:1.4;">Số cột: <b>${data.cot}</b>, No: <b>${data.cto}</b>, Trạm: <b>${data.tram}</b></p><p style="text-align:justify; margin-top:6px; margin-bottom:0; line-height:1.4; font-size:12px;">&nbsp;&nbsp;&nbsp;&nbsp;- Căn cứ luật điện lực số 61/2024/QH15 đã được Quốc hội nước Cộng hoà xã hội chủ nghĩa Việt Nam thông qua ngày 30/11/2024;<br>&nbsp;&nbsp;&nbsp;&nbsp;- Căn cứ Quy định về điều kiện, trình tự ngừng, giảm mức cung cấp điện được ban hành kèm theo Thông tư số 04/2025/TT-BCT ngày 01/02/2025 của Bộ trưởng Bộ Công thương;<br>&nbsp;&nbsp;&nbsp;&nbsp;- Căn cứ Hợp đồng mua bán điện đã ký kết giữa hai bên, thông báo thanh toán tiền điện lần nhất và số dư nợ tiền điện tính đến ${ngayIn} là: <b>${data.tien} đồng</b> mà quý khách hàng chưa thanh toán mặc dù đã quá thời hạn thoả thuận.</p><p style="text-align:justify; margin-top:6px; margin-bottom:0; line-height:1.4; font-size:12px;">&nbsp;&nbsp;&nbsp;&nbsp;Điện lực Vũ Thư xin gửi tới Quý khách hàng giấy thông báo thanh toán tiền điện lần thứ 2 và đề nghị Quý khách hàng thu xếp để thanh toán cho chúng tôi số dư nợ tiền điện trước <b>${ngayIn}</b>. Nếu đến hết giờ làm việc ngày <b>${ngayIn}</b>, Quý khách hàng vẫn chưa thanh toán đầy đủ số tiền điện còn nợ, chúng tôi buộc phải thông báo để quý khách hàng được biết:</p><p style="text-align:justify; margin:4px 0; line-height:1.4; font-size:12px; padding-left:8px;">&nbsp;&nbsp;&nbsp;&nbsp;- <b>Điện Lực Vũ Thư sẽ tính lãi chậm trả và phạt vi phạm hợp đồng với mức phạt là 8% giá trị tiền điện phát sinh trong kỳ.</b><br>&nbsp;&nbsp;&nbsp;&nbsp;- Sau ngày <b>........ tháng ${new Date().getMonth() + 1} năm ${new Date().getFullYear()}</b>, chúng tôi xin phép được tạm ngừng cấp điện cho Quý khách hàng.<br>&nbsp;&nbsp;&nbsp;&nbsp;- Lý do ngừng cấp điện: Do Quý Khách hàng chưa thanh toán tiền điện đúng thời hạn đã thoả thuận trong Hợp đồng.<br>&nbsp;&nbsp;&nbsp;&nbsp;- Thời hạn dự kiến đóng điện: Sau khi Quý khách đã thanh toán đầy đủ tiền điện; tiền lãi của số tiền chậm trả, phạt vi phạm hợp đồng và chi phí đóng, cắt điện.</p><p style="margin-top:6px; line-height:1.4; font-size:12px;">&nbsp;&nbsp;&nbsp;&nbsp;Đề nghị Quý khách hàng có kế hoạch chủ động trong thời gian mất điện trên.<br>&nbsp;&nbsp;&nbsp;&nbsp;<b>Xin trân trọng cảm ơn!</b></p><div style="position:absolute; bottom:5mm; left:10mm; right:10mm; display:flex; justify-content:space-between; text-align:center;"><div style="width:32%;"><p style="font-weight:bold; margin:0 0 2px 0; font-size:12px;">Người nhận thông báo</p><p style="font-style:italic; margin:0 0 55px 0; font-size:11px;">(Ký và ghi rõ họ tên)</p></div><div style="width:32%;"><p style="font-weight:bold; margin:0 0 2px 0; font-size:12px;">Người gửi thông báo</p><p style="font-style:italic; margin:0 0 55px 0; font-size:11px;">(ký và ghi rõ họ tên)</p></div><div style="width:32%;"><p style="font-weight:bold; margin:0 0 2px 0; font-size:12px;">ĐIỆN LỰC VŨ THƯ</p><p style="font-style:italic; margin:0; font-size:11px;">&nbsp;</p><p style="font-weight:bold; margin:55px 0 0 0; font-size:12px;"></p></div></div></div>`;
}

function inThongBaoTienDien() {
    if (!dataTableDuNo) return;
    let rowsTick = $('.chk-doc-no:checked'); if (rowsTick.length === 0) { alert("Sếp ơi, tick chọn ít nhất 1 khách hàng ở cột ĐỐC để in nhé!"); return; }
    let htmlInAll = ''; let homNay = new Date(); let strNgayIn = `ngày <span style="font-weight:bold;">${homNay.getDate().toString().padStart(2,'0')}</span> tháng <span style="font-weight:bold;">${homNay.getMonth() + 1}</span> năm <span style="font-weight:bold;">${homNay.getFullYear()}</span>`;
    rowsTick.each(function() {
        let tr = $(this).closest('tr'); let rowData = dataTableDuNo.row(tr).data();
        let cleanSo = (val) => val ? String(val).replace(/\.0$/, '').trim() : '';
        let sdtClean = rowData._sdtClean || 'Chưa có SĐT';
        let pData = { ten: rowData['Tên khách hàng'] || '--', maKH: rowData['Mã khách hàng'] || '--', diaChi: rowData['Địa chỉ khách hàng'] || '--', tram: rowData['Tên Trạm'] || '--', cot: cleanSo(rowData['Sô Cột'] || rowData['Số Cột']) || '--', cto: cleanSo(rowData['Sô CTơ'] || rowData['Số CTơ']) || '--', sdt: sdtClean, tien: rowData['Tổng tiền'] || '0' };
        htmlInAll += `<div class="trang-in-a4">${taoFormLien('Liên 2: Lưu Điện lực Vũ Thư', strNgayIn, pData)}<div class="duong-cat-doc"></div>${taoFormLien('Liên 1: Giao Khách Hàng', strNgayIn, pData)}</div>`;
    });
    document.getElementById('vung-in-thong-bao').innerHTML = htmlInAll; document.body.classList.add('dang-in-thong-bao'); window.print(); setTimeout(() => { document.body.classList.remove('dang-in-thong-bao'); }, 1000);
}

taiDuLieuDuNo(); 
// setInterval(taiDuLieuDuNo, 60000); 
</script>
</body>
